# Default paths for run_elsa.py --model (paths under convolution root unless absolute).
# Override any field via CLI. `data_subdir` is relative to convolution root (e.g. datas/ResNet50_data).

models:
  resnet50:
    datapath: "/data/user/output_bin_snn_resnet50_w4_a3_T16/"
    data_subdir: "datas/ResNet50_data"
    connection: "ResNet50_Connection_Last.pth"
    mapping: "Final_MeshMapping_ResNet50.pth"
    occupy: "TranOccupy_ResNet50.pth"
    default_time_step: 16
    default_calculate_info: "calculateInfoConv_ResNet50_a4w3_with_Noc_rep.pth"
    runner_module: "Compilers.ELSACompiler_ResNet50"
    runner_callable: "run_resnet50_vary_t"

